name: ASP.NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: [self-hosted, Windows]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Test
      run: dotnet test


  deploy:
    needs: build
    runs-on: [self-hosted, Windows]

    steps:

    # 🔥 1. STOP IIS (IMPORTANT - FIX LOCK)
    - name: Stop IIS App Pool
      run: |
        Import-Module WebAdministration
        Stop-WebAppPool -Name "TestingCICD"

    # 🔥 2. CLEAN OLD FILES
    - name: Clean deploy folder
      run: |
        Remove-Item -Recurse -Force D:\Deploy\TestingCICD -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path D:\Deploy\TestingCICD

    # 🔥 3. PUBLISH (NOW SAFE)
    - name: Publish
      run: dotnet publish -c Release -o D:\Deploy\TestingCICD

    # 🔥 4. START IIS
    - name: Start IIS App Pool
      run: |
        Import-Module WebAdministration
        Start-WebAppPool -Name "TestingCICD"
