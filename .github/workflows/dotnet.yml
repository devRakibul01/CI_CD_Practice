name: ASP.NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'

    - name: Restore packages
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release

    - name: Test project
      run: dotnet test

    - name: Ensure publish folder exists
      run: mkdir D:\Published\CICDAPI

    - name: Publish project
      run: dotnet publish -c Release -o D:\Published\CICDAPI

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
    - name: Deploy to IIS
      run: robocopy D:\Published\CICDAPI C:\inetpub\wwwroot\TestingCICD /MIR
