name: ASP.NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [self-hosted, Windows]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore and Build
      run: |
        dotnet restore
        dotnet build --configuration Release --no-restore

    - name: Publish to Temp Folder
      run: |
        # প্রোজেক্টটি একটি অস্থায়ী ফোল্ডারে পাবলিশ করছি
        dotnet publish -c Release -o "${{ github.workspace }}\publish_temp" --no-restore

  deploy:
    needs: build
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        shell: powershell

    steps:
    - name: Deploy via App Offline Method
      run: |
        $targetDir = "D:\Deploy\TestingCICD"
        $sourceDir = "${{ github.workspace }}\publish_temp\*"

        # ১. টার্গেট ফোল্ডার না থাকলে তৈরি করা
        if (!(Test-Path $targetDir)) {
            New-Item -ItemType Directory -Force -Path $targetDir
        }

        # ২. 'app_offline.htm' ফাইল তৈরি করা (এটি করলে IIS অটোমেটিক ফাইল লক ছেড়ে দেয়)
        Write-Host "Putting application offline..."
        "<h1>Site is undergoing maintenance</h1>" | Out-File -FilePath "$targetDir\app_offline.htm" -Force
        
        # IIS কে প্রসেস বন্ধ করার জন্য ৫ সেকেন্ড সময় দেওয়া
        Start-Sleep -s 5

        # ৩. নতুন ফাইল কপি করা (পারমিশন এরর এড়াতে Force ব্যবহার)
        Write-Host "Copying new files..."
        Copy-Item -Path $sourceDir -Destination $targetDir -Recurse -Force -ErrorAction SilentlyContinue

        # ৪. 'app_offline.htm' ডিলিট করা (এতে সাইট আবার অনলাইন হয়ে যাবে)
        if (Test-Path "$targetDir\app_offline.htm") {
            Remove-Item -Path "$targetDir\app_offline.htm" -Force
        }
        
        Write-Host "Deployment successful!"
