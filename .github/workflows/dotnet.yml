name: ASP.NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: [self-hosted, Windows]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Check .NET version
      run: dotnet --version

    - name: Restore packages
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release

    - name: Test project
      run: dotnet test

    - name: Ensure publish folder
      run: New-Item -ItemType Directory -Force -Path D:\Published\CICDAPI

    - name: Publish project
      run: dotnet publish -c Release -o D:\Published\CICDAPI


  deploy:
    needs: build
    runs-on: [self-hosted, Windows]

    steps:

    - name: Ensure deploy folder
      run: New-Item -ItemType Directory -Force -Path D:\Deploy\TestingCICD

    - name: Deploy files (robocopy safe)
      run: |
        robocopy D:\Published\CICDAPI D:\Deploy\TestingCICD /MIR /R:2 /W:2
        exit 0

    - name: Deployment complete
      run: echo "Deployment successful 🚀"
