name: ASP.NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [self-hosted, Windows]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # setup-dotnet বাদ দেওয়া হয়েছে কারণ আপনার পিসিতে এটা অলরেডি আছে
    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

  deploy:
    needs: build
    runs-on: [self-hosted, Windows]
    
    defaults:
      run:
        shell: powershell

    steps:
    # ১. IIS App Pool বন্ধ করা
    - name: Stop IIS App Pool
      run: |
        Import-Module WebAdministration
        $poolName = "TestingCICD"
        if (Get-WebAppPoolState -Name $poolName) {
            Write-Host "Stopping App Pool: $poolName"
            Stop-WebAppPool -Name $poolName
            Start-Sleep -s 5 # ফাইল লক ছাড়ার জন্য ৫ সেকেন্ড বিরতি
        }

    # ২. পুরনো ফাইল ডিলিট করে নতুন পাবলিশ করা
    - name: Clean and Publish
      run: |
        $deployPath = "D:\Deploy\TestingCICD"
        if (Test-Path $deployPath) {
            Write-Host "Cleaning old files..."
            Remove-Item -Recurse -Force "$deployPath\*" -ErrorAction SilentlyContinue
        } else {
            New-Item -ItemType Directory -Force -Path $deployPath
        }
        
        dotnet publish -c Release -o $deployPath --no-restore

    # ৩. IIS App Pool আবার চালু করা
    - name: Start IIS App Pool
      run: |
        Import-Module WebAdministration
        $poolName = "TestingCICD"
        Start-WebAppPool -Name $poolName
        Write-Host "Deployment Completed Successfully!"
