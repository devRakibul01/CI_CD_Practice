name: ASP.NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [self-hosted, Windows]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # আপনার পিসিতে .NET আগে থেকেই আছে তাই সরাসরি ব্যবহার করা হচ্ছে
    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

  deploy:
    needs: build
    runs-on: [self-hosted, Windows]
    
    defaults:
      run:
        shell: powershell

    steps:
    # ১. IIS App Pool বন্ধ করা (appcmd ব্যবহার করে যা পারমিশন এরর দেয় না সহজে)
    - name: Stop IIS App Pool
      run: |
        $appCmd = "C:\Windows\System32\inetsrv\appcmd.exe"
        $poolName = "TestingCICD"
        Write-Host "Checking App Pool: $poolName"
        
        # App Pool বন্ধ করার কমান্ড
        & $appCmd stop apppool /apppool.name:$poolName /text:TRUE
        
        # প্রসেস পুরোপুরি রিলিজ হওয়ার জন্য একটু সময় দেওয়া
        Write-Host "Waiting for IIS to release file locks..."
        Start-Sleep -s 10
      continue-on-error: true # যদি অলরেডি বন্ধ থাকে তবে যেন পরবর্তী স্টেপগুলো চলে

    # ২. পুরনো ফাইল ক্লিন এবং নতুন পাবলিশ
    - name: Clean and Publish
      run: |
        $deployPath = "D:\Deploy\TestingCICD"
        
        if (Test-Path $deployPath) {
            Write-Host "Cleaning directory: $deployPath"
            # সব ফাইল ফোর্স ডিলিট করার চেষ্টা
            Get-ChildItem -Path $deployPath -Recurse | Remove-Item -Force -Recurse -ErrorAction SilentlyContinue
        } else {
            New-Item -ItemType Directory -Force -Path $deployPath
        }
        
        Write-Host "Publishing new build..."
        dotnet publish -c Release -o $deployPath --no-restore

    # ৩. IIS App Pool আবার চালু করা
    - name: Start IIS App Pool
      run: |
        $appCmd = "C:\Windows\System32\inetsrv\appcmd.exe"
        $poolName = "TestingCICD"
        
        Write-Host "Starting App Pool: $poolName"
        & $appCmd start apppool /apppool.name:$poolName /text:TRUE
        Write-Host "Deployment Completed Successfully!"
