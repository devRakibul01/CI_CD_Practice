name: ASP.NET CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Check .NET version
      run: dotnet --version

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Test
      run: dotnet test

    - name: Ensure publish folder
      run: mkdir D:\Published\CICDAPI

    - name: Publish
      run: dotnet publish -c Release -o D:\Published\CICDAPI

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
    - name: Deploy to IIS
      run: robocopy D:\Published\CICDAPI C:\inetpub\wwwroot\TestingCICD /MIR
